<!DOCTYPE html>
<html>
<head>

    <title>MVD Smart Calc</title>
    <style>

        h3 { color: #1a73e8; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background: #f8f9fa; color: #555; }
        .final-row { background: #d4edda; font-weight: bold; color: #155724; }
        #res { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

    <div class="card" id="LGN">
        <h3>🔐 Lab Login</h3>
        <input type="text" id="uid" placeholder="User ID (shivam)">
        <input type="password" id="psw" placeholder="Password (shivam@7080)">
        <button onclick="check()">LOGIN</button>
    </div>

    <div class="card" id="APP" style="display:none;">

        <label>Lambda (λ):</label>
        <input type="number" id="Lam" value="0.125">
        <label>Dilution Steps:</label>
        <select id="stepSel">
            <option value="2">2 Steps</option>
            <option value="3" selected>3 Steps</option>
            <option value="4">4 Steps</option>
        </select>
        <button onclick="run()">Calculate Steps</button>
        <div id="res"></div>
    </div>

            if(u === "shivam" && p === "shivam@7080") {

                alert("Access Denied! Check ID/Password.");
            }
